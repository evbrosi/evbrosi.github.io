<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery — Eagle's Nest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="portfolio.css">
  <link rel="icon" href="/images/scan2129.jpg" type="image/x-icon">
  <style>
    .masonry-grid {
      columns: 3 220px;
      column-gap: 12px;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 12px;
      display: block;
      overflow: hidden;
      background: #f5f5f0;
    }

    .masonry-item img {
      width: 100%;
      display: block;
      transition: opacity 0.2s ease;
    }

    .masonry-item:hover img {
      opacity: 0.85;
    }

    .lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox-overlay.active {
      display: flex;
    }

    .lightbox-overlay img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      cursor: default;
    }

    .lightbox-close {
      position: fixed;
      top: 1.25rem;
      right: 1.5rem;
      color: #fff;
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.7;
    }

    .lightbox-close:hover { opacity: 1; }
  </style>
</head>
<body>
<main class="container-lg py-4">

  <div class="d-flex align-items-baseline gap-3 mb-4">
    <a href="index.html" style="font-size: 0.85rem; color: #888; text-decoration: none;">&larr; Back</a>
    <h2 class="mb-0">Work</h2>
  </div>

  <div class="masonry-grid">
    <!-- Replace src and alt values with your actual images -->
    <a class="masonry-item" href="#" data-img="images/work-01.jpg">
      <img src="images/work-01.jpg" alt="Comic page 1" loading="lazy">
    </a>
    <a class="masonry-item" href="#" data-img="images/work-02.jpg">
      <img src="images/work-02.jpg" alt="Comic page 2" loading="lazy">
    </a>
    <a class="masonry-item" href="#" data-img="images/work-03.jpg">
      <img src="images/work-03.jpg" alt="Zine spread" loading="lazy">
    </a>
    <a class="masonry-item" href="#" data-img="images/work-04.jpg">
      <img src="images/work-04.jpg" alt="Illustration" loading="lazy">
    </a>
    <a class="masonry-item" href="#" data-img="images/work-05.jpg">
      <img src="images/work-05.jpg" alt="Comic page 5" loading="lazy">
    </a>
    <a class="masonry-item" href="#" data-img="images/work-06.jpg">
      <img src="images/work-06.jpg" alt="Comic page 6" loading="lazy">
    </a>
    <a class="masonry-item" href="#" data-img="images/work-07.jpg">
      <img src="images/work-07.jpg" alt="Zine cover" loading="lazy">
    </a>
    <a class="masonry-item" href="#" data-img="images/work-08.jpg">
      <img src="images/work-08.jpg" alt="Illustration 2" loading="lazy">
    </a>
    <a class="masonry-item" href="#" data-img="images/work-09.jpg">
      <img src="images/work-09.jpg" alt="Comic spread" loading="lazy">
    </a>
  </div>

</main>

<div class="lightbox-overlay" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
  <img src="" alt="" id="lightbox-img">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="portfolio.js"></script>
<script>
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  document.querySelectorAll('.masonry-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
      e.preventDefault();
      lightboxImg.src = this.dataset.img;
      lightboxImg.alt = this.querySelector('img').alt;
      lightbox.classList.add('active');
    });
  });

  document.getElementById('lightbox-close').addEventListener('click', function() {
    lightbox.classList.remove('active');
  });

  lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox) lightbox.classList.remove('active');
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') lightbox.classList.remove('active');
  });
</script>
</body>
</html>
